[project]
name = "docksurf-py"
version = "0.1.0"
description = "Terminal UI for visualising Docker containers, images, volumes and networks"
requires-python = ">=3.11"
dependencies = [
    "textual>=0.80.0",
    "rich>=13.0.0",
]

[project.scripts]
docksurf-py = "docksurf_py.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["docksurf_py"]
